<!DOCTYPE html>
<html lang="pt-br">
    <head>
        <meta charset="UTF-8">
        <title>Sistema de Helpdesk</title>
        <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.min.css">
        <link rel="stylesheet" href="{{ url_for('static', filename='css/helpdesk.css') }}">
        <style>
            .page-panel--wide {
                max-width: 1400px;
            }

            #tabela-chamados th:nth-child(1),
            #tabela-chamados td:nth-child(1) {
                width: 5rem;
                text-align: center;
            }

            #tabela-chamados th:nth-child(2),
            #tabela-chamados td:nth-child(2) {
                width: 6rem;
                text-align: center;
            }

            #tabela-chamados th:nth-child(3),
            #tabela-chamados td:nth-child(3) {
                width: 22%;
            }

            #tabela-chamados th:nth-child(4),
            #tabela-chamados td:nth-child(4) {
                width: 44%;
            }

            #tabela-chamados td:nth-child(4) {
                word-break: break-word;
            }

            #tabela-chamados th:nth-child(5),
            #tabela-chamados td:nth-child(5) {
                width: 12rem;
                white-space: nowrap;
            }

            #tabela-chamados th:nth-child(6),
            #tabela-chamados td:nth-child(6) {
                width: 14rem;
                white-space: nowrap;
            }

            #tabela-chamados th,
            #tabela-chamados td {
                padding: 1.15rem 1.4rem;
            }

            #tabela-chamados {
                font-size: 1.08rem;
            }
        </style>
    </head>
<body>
    <main class="container">
        <section id="técnico_chamado" class="page-panel page-panel--wide">
            <h1>Fila de Chamados</h1>
            {% if atendimento %}
                <table role="grid" id="tabela-chamados" class="helpdesk-table">
                    <thead>
                        <tr>
                            <th>Selecionar</th>
                            <th>ID</th>
                            <th>Cliente</th>
                            <th>Descrição</th>
                            <th>Prioridade</th>
                            <th>Status</th>
                        </tr>
                    </thead>
                    <tbody>
                        {% for chamado in atendimento %}
                            <tr data-chamado-id="{{ chamado.id }}">
                                <td class="selection-cell">
                                    <input type="radio" name="chamado_selecionado" value="{{ chamado.id }}" aria-label="Selecionar chamado {{ chamado.id }}">
                                </td>
                                <td>{{ chamado.id }}</td>
                                <td>{{ chamado.cliente }}</td>
                                <td>{{ chamado.descricao }}</td>
                                <td>{{ chamado.prioridade }}</td>
                                <td>{{ chamado.status }}</td>
                            </tr>
                        {% endfor %}
                    </tbody>
                </table>
                <form class="actions-row" id="acoes-chamado-form" method="POST">
                    <button type="submit" id="btn-atender" data-acao="atender" disabled>Atender</button>
                    <button type="submit" id="btn-concluir" data-acao="concluir" disabled>Concluir</button>
                    <button type="submit" id="btn-cancelar" data-acao="cancelar" disabled>Cancelar</button>
                </form>
                <script>
                    const radios = document.querySelectorAll('input[name="chamado_selecionado"]');
                    const formAcoes = document.getElementById('acoes-chamado-form');
                    const botoes = [
                        document.getElementById('btn-atender'),
                        document.getElementById('btn-concluir'),
                        document.getElementById('btn-cancelar')
                    ];

                    function atualizarAcoes() {
                        const selecionado = document.querySelector('input[name="chamado_selecionado"]:checked');
                        const habilitar = Boolean(selecionado);

                        botoes.forEach((botao) => {
                            botao.disabled = !habilitar;
                        });

                        document.querySelectorAll('#tabela-chamados tbody tr').forEach((linha) => {
                            linha.classList.toggle('row-selected', linha.dataset.chamadoId === (selecionado ? selecionado.value : ''));
                        });
                    }

                    radios.forEach((radio) => {
                        radio.addEventListener('change', atualizarAcoes);
                    });

                    formAcoes.addEventListener('submit', (event) => {
                        const selecionado = document.querySelector('input[name="chamado_selecionado"]:checked');
                        const acao = event.submitter ? event.submitter.dataset.acao : null;

                        if (!selecionado || !acao) {
                            event.preventDefault();
                            return;
                        }

                        formAcoes.action = `/chamados/${selecionado.value}/${acao}`;
                    });

                    atualizarAcoes();
                </script>
            {% endif %}
            
            <p class="centered-button-block">
                <a href="{{ url_for('voltar2') }}" role="button" class="full-button">Voltar</a>
            </p>
        </section>
    </main>
</body>
</html>
